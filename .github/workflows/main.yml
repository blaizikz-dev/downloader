name: AVASAM File Uploader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download URLs (space separated for multiple files)'
        required: true
        type: string
        default: ''
      password:
        description: 'Zip password (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.urls }}" ]; then
            echo ""
            echo "❌ No download link entered!"
            echo ""
            echo "📌 Guide:"
            echo "   1️⃣ Run the workflow again"
            echo "   2️⃣ Enter the file URL in the 'urls' field"
            echo "   3️⃣ For multiple files, separate URLs with space"
            echo ""
            exit 1
          fi
          echo "✅ URL received: ${{ github.event.inputs.urls }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for large files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global http.postBuffer 524288000
          echo "Git configured"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget zip unzip bc
          echo "Dependencies installed"

      - name: Download files
        id: download
        run: |
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          # Create directories
          mkdir -p downloads temp_downloads
          
          echo "Starting download process..."
          echo "URLs to download: $URLS"
          
          SUCCESS_COUNT=0
          FAILED_COUNT=0
          FILE_LIST=""
          
          # Download each URL
          for URL in $URLS; do
            # Extract filename from URL
            FILENAME=$(basename "$URL" | sed 's/?.*//' | sed 's/[^a-zA-Z0-9._-]/_/g')
            if [ -z "$FILENAME" ]; then
              FILENAME="file_$(date +%s)_$((RANDOM % 1000))"
            fi
            
            echo ""
            echo "Downloading: $URL"
            echo "Saving as: $FILENAME"
            
            # Try downloading with curl
            if curl -L -f --retry 3 --retry-delay 5 --connect-timeout 30 \
               --max-time 600 --progress-bar -o "temp_downloads/$FILENAME" "$URL"; then
              
              if [ -f "temp_downloads/$FILENAME" ] && [ -s "temp_downloads/$FILENAME" ]; then
                SIZE=$(du -h "temp_downloads/$FILENAME" | cut -f1)
                echo "✅ Successfully downloaded: $FILENAME ($SIZE)"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                FILE_LIST="$FILE_LIST $FILENAME"
              else
                echo "❌ Downloaded file is empty: $FILENAME"
                FAILED_COUNT=$((FAILED_COUNT + 1))
              fi
            else
              echo "❌ Failed to download: $URL"
              FAILED_COUNT=$((FAILED_COUNT + 1))
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "Download Summary:"
          echo "✅ Success: $SUCCESS_COUNT"
          echo "❌ Failed: $FAILED_COUNT"
          echo "=========================================="
          
          # Save counts for summary
          echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
          
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "No files downloaded successfully"
            exit 1
          fi

      - name: Create zip archives
        run: |
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          MAIN_FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$MAIN_FOLDER"
          
          echo "Creating archives in: $MAIN_FOLDER"
          
          # Process each downloaded file
          for FILE in temp_downloads/*; do
            if [ -f "$FILE" ]; then
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              
              # Create folder for each file
              FILE_FOLDER="$MAIN_FOLDER/${BASENAME_NO_EXT}"
              mkdir -p "$FILE_FOLDER"
              
              # Get file size
              SIZE=$(stat -c%s "$FILE")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              echo "Processing: $BASENAME (${SIZE_MB}MB)"
              
              # Create zip archive
              if [ -n "$ZIP_PASSWORD" ]; then
                # Create password-protected zip
                zip -j -P "$ZIP_PASSWORD" "$FILE_FOLDER/${BASENAME_NO_EXT}.zip" "$FILE"
              else
                # Create regular zip
                zip -j "$FILE_FOLDER/${BASENAME_NO_EXT}.zip" "$FILE"
              fi
              
              # Check if zip was created
              if [ -f "$FILE_FOLDER/${BASENAME_NO_EXT}.zip" ]; then
                ZIP_SIZE=$(du -h "$FILE_FOLDER/${BASENAME_NO_EXT}.zip" | cut -f1)
                echo "  ✅ Created: ${BASENAME_NO_EXT}.zip ($ZIP_SIZE)"
                
                # Create README for this file
                cat > "$FILE_FOLDER/README.md" << EOF
# ${BASENAME_NO_EXT}

**Original file:** \`$BASENAME\`  
**Size:** ${SIZE_MB} MB  
**Archive:** \`${BASENAME_NO_EXT}.zip\`

## Download
- [Click here to download](${BASENAME_NO_EXT}.zip)

## Extract
\`\`\`bash
# Without password
unzip ${BASENAME_NO_EXT}.zip

# With password (if set)
unzip -P "password" ${BASENAME_NO_EXT}.zip
\`\`\`

---
*Uploaded by AVASAM Downloader - https://avasam.ir*
EOF
              else
                echo "  ❌ Failed to create zip for $BASENAME"
              fi
            fi
          done
          
          # Clean up temp files
          rm -rf temp_downloads
          
          echo "FOLDER_NAME=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Create main README
        run: |
          TIMESTAMP="${{ steps.download.folder_name }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          
          cat > downloads/README.md << EOF
# Downloaded Files

This directory contains files downloaded on $(date '+%Y-%m-%d %H:%M:%S UTC')

## Available Downloads

EOF
          
          # List all folders
          for folder in downloads/*/; do
            if [ -d "$folder" ] && [ -f "$folder/README.md" ]; then
              FOLDER_NAME=$(basename "$folder")
              echo "- [${FOLDER_NAME}](${FOLDER_NAME}/)" >> downloads/README.md
            fi
          done
          
          cat >> downloads/README.md << EOF

---
*AVASAM Downloader - https://avasam.ir*
EOF
          
          echo "Main README created"

      - name: Push to repository
        run: |
          # Pull latest changes
          git pull origin main --rebase || true
          
          # Add all downloads
          git add downloads/
          git add README.md 2>/dev/null || true
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No files to commit"
            exit 0
          fi
          
          # Commit
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          git commit -m "AVASAM: Add downloaded files ($TIMESTAMP)"
          
          # Push with retry
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            if git push origin main; then
              echo "✅ Push successful!"
              exit 0
            fi
            git pull origin main --rebase
            sleep 5
          done
          
          echo "❌ Failed to push after 5 attempts"
          exit 1

      - name: Generate summary
        if: always()
        run: |
          SUCCESS="${{ steps.download.outputs.success_count }}"
          FAILED="${{ steps.download.outputs.failed_count }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
## 📊 Download Summary

| Item | Result |
|------|--------|
| **Status** | $( [ "$SUCCESS" -gt 0 ] && echo "✅ Partial Success" || echo "❌ Failed" ) |
| **Successful Downloads** | $SUCCESS |
| **Failed Downloads** | $FAILED |
| **Upload Location** | [downloads/${TIMESTAMP}](https://github.com/${{ github.repository }}/tree/main/downloads/${TIMESTAMP}) |

### 📁 Access your files:
\`\`\`
https://github.com/${{ github.repository }}/tree/main/downloads/${TIMESTAMP}
\`\`\`

### 🔧 Extract files:
\`\`\`bash
# If password protected
unzip -P "your_password" file.zip

# Without password  
unzip file.zip
\`\`\`

---
**AVASAM Downloader** - *Your download solution*
EOF
