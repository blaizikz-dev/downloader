name: Advanced File Upload to GitHub

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'File URLs (one per line, max 10 URLs)'
        required: true
        type: string
        default: ''
      zip_password:
        description: 'Archive password (optional)'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Maximum chunk size (MB)'
        required: false
        type: choice
        default: '95'
        options:
          - '10'
          - '25'
          - '50'
          - '95'
      compression_level:
        description: 'Compression level (0=none, 9=ultra)'
        required: false
        type: choice
        default: '3'
        options:
          - '0'
          - '1'
          - '3'
          - '5'
          - '7'
          - '9'
      delete_old_archives:
        description: 'Delete all existing archives before upload'
        required: false
        type: boolean
        default: false
      custom_prefix:
        description: 'Custom prefix for output files'
        required: false
        type: string
        default: 'file'

permissions:
  contents: write

concurrency:
  group: file-upload-queue
  cancel-in-progress: false

jobs:
  upload-files:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          rm -rf downloads/* 2>/dev/null || true
          echo "Cleanup completed"

      - name: Parse and validate inputs
        id: validate
        run: |
          echo "split_mb=${{ github.event.inputs.split_size }}" >> $GITHUB_OUTPUT
          echo "compress=${{ github.event.inputs.compression_level }}" >> $GITHUB_OUTPUT
          
          PREFIX="${{ github.event.inputs.custom_prefix }}"
          if [ -z "$PREFIX" ]; then
            PREFIX="file"
          fi
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT
          
          echo "${{ github.event.inputs.file_urls }}" | grep -v '^[[:space:]]*$' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > urls.txt
          
          total=$(wc -l < urls.txt)
          if [ "$total" -eq 0 ]; then
            echo "Error: No valid URLs provided"
            exit 1
          fi
          
          if [ "$total" -gt 10 ]; then
            head -10 urls.txt > urls_temp.txt
            mv urls_temp.txt urls.txt
            total=10
          fi
          
          echo "url_count=${total}" >> $GITHUB_OUTPUT
          echo "URL count: ${total}"
          cat urls.txt

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full curl wget

      - name: Download files
        id: download
        run: |
          mkdir -p downloads/temp
          cd downloads/temp
          
          PREFIX="${{ steps.validate.outputs.prefix }}"
          TOTAL_URLS="${{ steps.validate.outputs.url_count }}"
          
          cat > download_single.sh << 'EOF'
          #!/bin/bash
          URL="$1"
          COUNTER="$2"
          TOTAL="$3"
          PREFIX="$4"
          
          FILENAME=$(basename "$URL" | cut -d'?' -f1 | sed 's/[^a-zA-Z0-9._-]/_/g')
          if [ -z "$FILENAME" ]; then
            FILENAME="file_${COUNTER}"
          fi
          
          if [ "$TOTAL" -gt 1 ]; then
            NUM=$(printf '%02d' $COUNTER)
            OUTPUT_NAME="${PREFIX}_${NUM}_${FILENAME}"
          else
            OUTPUT_NAME="${PREFIX}_${FILENAME}"
          fi
          
          if [ ${#OUTPUT_NAME} -gt 100 ]; then
            EXT="${OUTPUT_NAME##*.}"
            BASE="${OUTPUT_NAME%.*}"
            BASE="${BASE:0:80}"
            OUTPUT_NAME="${BASE}.${EXT}"
          fi
          
          echo "[$COUNTER/$TOTAL] Downloading: $OUTPUT_NAME"
          
          if curl -L --fail --retry 3 --retry-delay 5 --connect-timeout 30 \
             --max-time 300 --progress-bar -o "$OUTPUT_NAME" "$URL" 2>&1; then
            SIZE=$(du -h "$OUTPUT_NAME" | cut -f1)
            echo "SUCCESS: $OUTPUT_NAME ($SIZE)"
            echo "$OUTPUT_NAME" >> ../downloaded.txt
            exit 0
          elif wget --tries=3 --timeout=300 -q -O "$OUTPUT_NAME" "$URL" 2>&1; then
            SIZE=$(du -h "$OUTPUT_NAME" | cut -f1)
            echo "SUCCESS: $OUTPUT_NAME ($SIZE)"
            echo "$OUTPUT_NAME" >> ../downloaded.txt
            exit 0
          else
            echo "FAILED: $URL"
            exit 1
          fi
          EOF
          
          chmod +x download_single.sh
          
          COUNTER=1
          SUCCESS=0
          FAILED=0
          
          while IFS= read -r url; do
            if [ -n "$url" ]; then
              if bash download_single.sh "$url" "$COUNTER" "$TOTAL_URLS" "$PREFIX"; then
                SUCCESS=$((SUCCESS + 1))
              else
                FAILED=$((FAILED + 1))
              fi
              COUNTER=$((COUNTER + 1))
            fi
          done < ../../urls.txt
          
          echo "success_count=${SUCCESS}" >> $GITHUB_OUTPUT
          echo "failed_count=${FAILED}" >> $GITHUB_OUTPUT
          echo "Download stats - Success: $SUCCESS, Failed: $FAILED"
          
          if [ "$SUCCESS" -eq 0 ]; then
            echo "No files downloaded successfully"
            exit 1
          fi

      - name: Archive and split files
        id: archive
        run: |
          SPLIT_MB="${{ steps.validate.outputs.split_mb }}"
          COMPRESS="${{ steps.validate.outputs.compress }}"
          PASSWORD="${{ github.event.inputs.zip_password }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          
          echo "Output folder: ${FOLDER}"
          echo "Split size: ${SPLIT_MB}MB"
          echo "Compression level: ${COMPRESS}"
          
          PROCESSED=0
          cd downloads/temp
          
          for file in *; do
            if [ -f "$file" ]; then
              PROCESSED=$((PROCESSED + 1))
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              echo "Processing: $file"
              
              if [ -n "$PASSWORD" ] && [ ${#PASSWORD} -gt 0 ]; then
                7z a -p"$PASSWORD" -mhe=on -mx=${COMPRESS} -v${SPLIT_MB}m "../${FOLDER}/${file}.7z" "$file" > /dev/null 2>&1
              else
                7z a -mx=${COMPRESS} -v${SPLIT_MB}m "../${FOLDER}/${file}.7z" "$file" > /dev/null 2>&1
              fi
              
              if [ -f "../${FOLDER}/${file}.7z.001" ]; then
                if [ ! -f "../${FOLDER}/${file}.7z.002" ]; then
                  mv "../${FOLDER}/${file}.7z.001" "../${FOLDER}/${file}.7z"
                fi
              fi
            fi
          done
          
          cd ../..
          TOTAL_SIZE=$(du -sh "$FOLDER" | cut -f1)
          echo "processed_count=${PROCESSED}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT
          echo "total_size=${TOTAL_SIZE}" >> $GITHUB_OUTPUT
          
          rm -rf downloads/temp
          echo "Processed ${PROCESSED} files, total size: ${TOTAL_SIZE}"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          FOLDER="${{ steps.archive.outputs.folder }}"
          
          git add "${FOLDER}/"* 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No files to commit"
            exit 0
          fi
          
          CHUNK_COUNT=$(git diff --staged --name-only | wc -l)
          git commit -m "Upload: ${{ steps.archive.outputs.processed_count }} file(s) to ${FOLDER} (${CHUNK_COUNT} chunks)"
          
          MAX_RETRIES=5
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Push attempt $attempt/$MAX_RETRIES..."
            git pull --rebase origin main 2>/dev/null || true
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            sleep 10
          done
          
          echo "Push failed after $MAX_RETRIES attempts"
          exit 1

      - name: Summary
        if: always()
        run: |
          SUCCESS_DL="${{ steps.download.outputs.success_count }}"
          FAILED_DL="${{ steps.download.outputs.failed_count }}"
          PROCESSED="${{ steps.archive.outputs.processed_count }}"
          TOTAL_SIZE="${{ steps.archive.outputs.total_size }}"
          FOLDER="${{ steps.archive.outputs.folder }}"
          SPLIT_SIZE="${{ steps.validate.outputs.split_mb }}"
          
          echo "## Upload Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Download Status | ✅ $SUCCESS_DL success / ❌ $FAILED_DL failed |" >> $GITHUB_STEP_SUMMARY
          echo "| Files Processed | $PROCESSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Size | ${TOTAL_SIZE:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| Chunk Size | $SPLIT_SIZE MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Output Folder | [${FOLDER}](https://github.com/${{ github.repository }}/tree/main/${FOLDER}) |" >> $GITHUB_STEP_SUMMARY
